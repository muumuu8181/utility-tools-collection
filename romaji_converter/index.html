<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【完全オフライン版】日本語ローマ字変換</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            width: 80%;
            max-width: 600px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #romaji-output {
            width: 100%;
            min-height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            text-align: left;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>【完全オフライン版】日本語ローマ字変換</h1>
        <textarea id="japanese-input" placeholder="ここに日本語を入力してください"></textarea>
        <div id="romaji-output"></div>
        <button id="convert-button" disabled>読み込み中...</button>
    </div>

    <!-- ローカルのライブラリを読み込む -->
    <script src="kuroshiro.min.js"></script>
    <script src="kuroshiro-analyzer-kuromoji.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const japaneseInput = document.getElementById('japanese-input');
            const romajiOutput = document.getElementById('romaji-output');
            const convertButton = document.getElementById('convert-button');

            romajiOutput.textContent = 'ライブラリを読み込んでいます...';

            try {
                const kuroshiro = new Kuroshiro();
                romajiOutput.textContent = '辞書を読み込んでいます...（数秒かかります）';

                // ローカルの辞書ファイルを指定
                kuroshiro.init(new KuromojiAnalyzer({ dictPath: './dict' }))
                    .then(() => {
                        romajiOutput.textContent = '準備完了です。日本語を入力して変換ボタンを押してください。';
                        convertButton.textContent = '変換';
                        convertButton.disabled = false;

                        convertButton.addEventListener('click', () => {
                            const input = japaneseInput.value;
                            if (input) {
                                kuroshiro.convert(input, { to: 'romaji', romajiSystem: 'passport' })
                                    .then(result => {
                                        romajiOutput.textContent = result;
                                    })
                                    .catch(err => {
                                        romajiOutput.textContent = 'エラー: 変換に失敗しました。';
                                        console.error(err);
                                    });
                            } else {
                                romajiOutput.textContent = '';
                            }
                        });
                    })
                    .catch(err => {
                        romajiOutput.textContent = 'エラー: 辞書の読み込みに失敗しました。';
                        convertButton.textContent = 'エラー';
                        console.error(err);
                    });

            } catch (e) {
                romajiOutput.textContent = 'エラー: ライブラリの初期化に失敗しました。';
                convertButton.textContent = 'エラー';
                console.error(e);
            }
        });
    </script>
</body>
</html>
